##### ========= 基础按键 =========

# 前缀键：沿用你的习惯
set -g prefix C-w
unbind C-b
bind C-w send-prefix

# 更快响应
set -sg escape-time 10

##### ========= 终端 / 显示 =========

# 256 色 + 更好的 RGB 支持
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# 提示显示时间
set -g display-time 3000

# 历史滚动行数
set -g history-limit 100000

# 鼠标支持：切 pane / 调大小 / 滚动
set -g mouse on

# 点击状态栏切 window
bind -n MouseDown1Status select-window -t =
bind -n MouseDown3Status select-window -t =

##### ========= 编号与命名 =========

# 从 1 开始编号
set -g base-index 1
setw -g pane-base-index 1

# 关闭 window 后自动重排编号
set -g renumber-windows on

# 不让程序自动改 window 名，避免 cc/run/git/logs 被覆盖
setw -g automatic-rename off
setw -g allow-rename off

##### ========= Session / Window 管理 =========

# session / window 切换
bind s choose-session
bind w choose-window
bind n next-window
bind p previous-window
bind l last-window

# 新建 window（继承当前路径）
bind c new-window -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# 重命名
bind , command-prompt -I "#W" "rename-window '%%'"
bind '$' command-prompt -I "#S" "rename-session '%%'"

##### ========= Pane 分栏 =========

# 分栏（继承当前路径）
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# pane 间移动（vim 风格）
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# 最近 pane / 最近 window
bind -r e last-pane
bind -r ^e last-window

# 交换 pane
bind -r ^u swap-pane -U
bind -r ^d swap-pane -D

# 调整 pane 大小
bind -r ^h resize-pane -L 10
bind -r ^j resize-pane -D 10
bind -r ^k resize-pane -U 10
bind -r ^l resize-pane -R 10

# 当前 pane 最大化 / 还原（对应 Ghostty Cmd+Shift+Enter）
bind z resize-pane -Z

# 均分所有 pane（对应 Ghostty Cmd+Shift+=）
bind = select-layout tiled

# 关闭当前 pane（对应 Ghostty Cmd+W）
bind x kill-pane

# 清除历史（对应 Ghostty Cmd+K）
bind K send-keys "clear" Enter \; clear-history

##### ========= 复制模式 =========

setw -g mode-keys vi

# 进入复制模式
bind Escape copy-mode

# vi 风格复制
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### ========= 常用辅助 =========

# 重载配置
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# man page 临时分屏查看
bind m command-prompt "split-window -h -c '#{pane_current_path}' 'exec man %%'"

##### ========= SuperShell 集成 =========

# Ctrl-w S → 启动 SuperShell 交互式面板
bind S display-popup -E -w 85% -h 80% -T " ⚡ SuperShell " \
  "bash ~/tmux-ai/scripts/supershell.sh"

# Ctrl-w M → 启动服务器监控（弹窗）
bind M display-popup -E -w 90% -h 85% -T " 🖥 Server Monitor " \
  "bash ~/tmux-ai/scripts/server-monitor.sh"

# Ctrl-w L → 快速登录选择器（fzf）
bind L display-popup -E -w 60% -h 50% -T " 🔗 Login " \
  "bash ~/tmux-ai/scripts/login.sh --fzf"

##### ========= 状态栏 =========

# 刷新频率
set -g status-interval 5

# 状态栏位置
set -g status-position bottom

# 左对齐
set -g status-justify left

# 有活动时提示
setw -g monitor-activity on
set -g visual-activity off

# 长度控制
set -g status-left-length 80
set -g status-right-length 150

# 状态栏底色
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# 左侧：session 名 + 图标
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold]  #S #[bg=#1a1b26,fg=#7aa2f7]#[default] "

# 右侧：服务器状态 + prefix + 主机名 + 时间
set -g status-right "#(bash ~/tmux-ai/scripts/tmux-server-status.sh) #{?client_prefix,#[bg=#e0af68,fg=#1a1b26,bold] ⌨ PREFIX #[default] ,}#[fg=#565f89]#[bg=#565f89,fg=#c0caf5] #H #[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M #[default]"

# window 标签样式
set -wg window-status-separator ""
set -wg window-status-format "#[fg=#565f89] #I:#W "
set -wg window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold] #I:#W #[bg=#1a1b26,fg=#bb9af7]#[default]"
set -wg window-status-current-style "default"
set -wg window-status-activity-style "fg=#e0af68"

# 消息样式
set -g message-style "bg=#1a1b26,fg=#7aa2f7,bold"
set -g message-command-style "bg=#1a1b26,fg=#bb9af7"

# 模式样式（copy-mode 等）
set -wg mode-style "bg=#283457,fg=#c0caf5"

##### ========= Pane 边框 =========

# Pane 边框样式
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy

# 弹窗样式
set -g popup-border-style "fg=#7aa2f7"
set -g popup-border-lines rounded

##### ========= SSH / 环境变量 =========

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID WINDOWID XAUTHORITY"

##### ========= 插件 =========

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# 开机 / 重连后自动恢复
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'



set -s set-clipboard on

# 复制模式（vi）：y / Enter / 拖选结束 → 复制到系统剪贴板
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# 鼠标拖选结束 → 复制到系统剪贴板，保持选中高亮停留（不退出 copy-mode）
# 注意：拖选时 tmux 已自动进入 copy-mode，不能再调用 copy-mode 否则会跳回底部
bind -n MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy"

# 右键粘贴系统剪贴板（对应 Ghostty 粘贴行为）
bind -n MouseDown3Pane run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"







run '~/.tmux/plugins/tpm/tpm'
